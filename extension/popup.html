<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Prompt Refinery</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="logo-mark">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 6 L27 6 L19 16 L19 26 L13 28 L13 16 Z" />
          <line x1="9" y1="11" x2="23" y2="11" opacity="0.5" />
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">Prompt Refinery</div>
        <div class="logo-tagline">Well-structured prompts.</div>
      </div>
    </header>

    <main class="main">
      <section id="empty-state" class="section">
        <textarea
          id="rough-input"
          class="rough-input"
          placeholder="Type a rough prompt to refine..."
          rows="5"
          maxlength="3000"
        ></textarea>

        <div class="composer-row">
          <select id="category" class="category-select" aria-label="Category">
            <option value="general">General</option>
            <option value="writing">Writing</option>
            <option value="code">Code</option>
            <option value="analysis">Analysis</option>
            <option value="brainstorm">Brainstorm</option>
          </select>
          <button id="refine-btn" class="refine-btn" type="button">
            <span class="refine-btn-text">Refine</span>
          </button>
        </div>

        <div id="char-count" class="char-count"></div>
      </section>

      <section id="loading-state" class="section hidden" aria-live="polite">
        <div class="loading-box">
          <div class="loading-dots">
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
          </div>
          <div class="loading-text">Refining prompt…</div>
        </div>
      </section>

      <section id="result-state" class="section hidden">
        <div class="result-header">
          <span class="result-label">Refined prompt</span>
          <span id="score-pill" class="score-pill hidden"></span>
        </div>
        <div id="result-body" class="result-body"></div>

        <div class="result-actions">
          <button id="copy-btn" class="action-btn primary" type="button">
            <span id="copy-btn-text">Copy</span>
          </button>
          <button id="new-btn" class="action-btn" type="button">
            <span>New prompt</span>
          </button>
        </div>

        <details id="changes-details" class="changes-details hidden">
          <summary class="changes-summary">What changed</summary>
          <ol id="changes-list" class="changes-list"></ol>
        </details>
      </section>

      <section id="error-state" class="section hidden" aria-live="assertive">
        <div class="error-box">
          <div id="error-text" class="error-text"></div>
          <button id="error-retry-btn" class="action-btn" type="button">
            <span>Try again</span>
          </button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span class="footer-hint">⌘+Enter to refine</span>
      <span class="footer-version">v0.1.0</span>
    </footer>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
