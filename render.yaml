services:
  - type: web
    name: prompt-refina-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      # Set ANTHROPIC_API_KEY in the Render dashboard — never commit the real key
      - key: ANTHROPIC_API_KEY
        sync: false

      # Your Vercel frontend URL (add after deploying frontend)
      - key: ALLOWED_ORIGINS
        sync: false

      # Upstash Redis for durable shared-prompt storage. Without these, shares
      # fall back to an ephemeral file and are lost on restart/redeploy.
      # Get both from the Upstash console (or the Vercel Marketplace integration).
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

      # Supabase (server-side auth) — lets AI routes identify the signed-in user
      # and rate-limit per user. Same values as the client's Supabase project.
      # Without these, requests are simply treated as anonymous.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

      # Service-role key — ONLY used by the Stripe webhook to update profiles
      # (no user token in a webhook). Server-only secret; never expose client-side.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # Stripe billing. Without STRIPE_SECRET_KEY the billing endpoints are inert.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Where Checkout/portal return to (your Vercel URL).
      - key: APP_FRONTEND_URL
        sync: false

      - key: NODE_ENV
        value: production
