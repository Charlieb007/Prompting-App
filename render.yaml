services:
  - type: web
    name: prompt-refina-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      # Set ANTHROPIC_API_KEY in the Render dashboard — never commit the real key
      - key: ANTHROPIC_API_KEY
        sync: false

      # Your Vercel frontend URL (add after deploying frontend)
      - key: ALLOWED_ORIGINS
        sync: false

      # Upstash Redis for durable shared-prompt storage. Without these, shares
      # fall back to an ephemeral file and are lost on restart/redeploy.
      # Get both from the Upstash console (or the Vercel Marketplace integration).
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

      - key: NODE_ENV
        value: production
