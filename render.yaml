services:
  - type: web
    name: prompt-refina-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      # Set ANTHROPIC_API_KEY in the Render dashboard — never commit the real key
      - key: ANTHROPIC_API_KEY
        sync: false

      # Your Vercel frontend URL (add after deploying frontend)
      - key: ALLOWED_ORIGINS
        sync: false

      - key: NODE_ENV
        value: production
